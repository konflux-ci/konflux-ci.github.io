      - "Kubernetes cluster deployments"
      - "Building from source for development"
      - "Release bundles and OLM installation"
    link:
      label: "View Full Documentation"
      href: "https://konflux-ci.dev/konflux-ci/docs"
      icon: "ArrowRightIcon"

