sectionLabel: "TRY KONFLUX LOCALLY"
heading: "Choose your installation method"
subtitle: "Get Konflux running on your own cluster in minutes. Pick the method that best fits your environment and experience level."

installationOptions:
  - icon: "BoxIcon"
    badge: "Recommended"
    badgeColor: "blue"
    title: "Local Installation with Kind"
    description: "Deploy a fully functional Konflux instance locally using Kind (Kubernetes-in-Docker). The recommended approach for development, experimentation, and contribution — backed by the official installation guide."
    features:
      - "Uses Kind — Kubernetes-in-Docker"
      - "Official Konflux CI deployment scripts"
      - "Full UI, Tekton pipelines & signing included"
    link:
      label: "Install with Kind"
      href: "/docs/installation/kind"
      icon: "ArrowRightIcon"

  - icon: "TerminalIcon"
    badge: "Full factory setup"
    badgeColor: "blue"
    title: "Trusted Software Factory CLI"
    description: "Use the tsf-cli to bootstrap a complete, production-ready Trusted Software Factory with automated configuration. One tool that wires everything together."
    features:
      - "End-to-end installation instructions"
      - "Red Hat opinionated setup"
      - "Integrates GitHub, pipelines & policies"
    link:
      label: "Install with tsf-cli"
      href: "/docs/installation/tsf-cli"
      icon: "ArrowRightIcon"

