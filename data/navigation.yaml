          href: "https://github.com/konflux-ci/community"
        - label: "GitHub"
          href: "https://github.com/konflux-ci"
        - label: "Slack"
          href: "https://konflux-ci.slack.com"
    - heading: "SUPPORT"
      links:
        - label: "Support Center"
          href: "https://github.com/konflux-ci/support"
        - label: "GitHub Issues"
          href: "https://github.com/konflux-ci/konflux-ci/issues"
        - label: "Release Notes"
          href: "https://github.com/konflux-ci/konflux-ci/releases"
