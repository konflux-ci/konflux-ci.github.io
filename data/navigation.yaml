# /data/navigation.yaml
# Header navigation and footer links.
# Content team: edit this file to change nav items and footer links.

# Header is configured in docusaurus.config.js.
# Edit that file to change header structure, styling, or add dropdowns.
# This file only controls the label and href of footer only.
header:

