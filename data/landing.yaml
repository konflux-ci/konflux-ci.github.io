# /data/landing.yaml
# All content for the landing page (/).
# Content team: edit this file to change landing page text.
# Do NOT edit any .tsx files.

hero:
  headline: "Secure builds made easy"
  subtitle: "Konflux is a trusted software factory, built from leading open source projects, that makes securing your container builds straightforward."
  tagline: "Your code deserves a factory, not a toolchain."
  primaryCTA:
    label: "Try Konflux"
    href: "/try-konflux"
    icon: "CodeIcon"
  pipelineDiagram:
    sourceCode:
      label: "SOURCE CODE"
      icons: ["GithubIcon", "GitlabIcon"]
    factory:
      icon: "CubesIcon"
      title: "Konflux Factory"
      subtitle: "Build · Sign · Scan · Attest"
      techBadges: ["Tekton", "Sigstore", "Clair", "SBOM"]
    verifiedOutput:
      label: "VERIFIED OUTPUT"
      badges:
        - label: "SLSA L3"
          icon: "CheckCircleIcon"
          color: "green"
        - label: "Signed"
          icon: "CheckCircleIcon"
          color: "blue"

whyKonflux:
  sectionLabel: "WHY KONFLUX"
  heading: "The secure CI/CD platform that scales as fast as your code."
  subtitle: "Are fragmented tools slowing you down? Are security gaps keeping you up at night? Konflux brings it all under one roof."
  cards:
    - icon: "BoltIcon"
      image: "/img/features/cicd-automation.svg"
      title: "CI/CD Automation"
      description: "Build container images and other artifacts from source. Automate builds, tests, and releases with repeatable, dependable outcomes."
    - icon: "LockIcon"
      image: "/img/features/securely-sign.svg"
      title: "Securely Sign"
      description: "Generate secure, detailed provenance — an immutable record of what happened during every build step."
    - icon: "ShieldAltIcon"
      image: "/img/features/supply-chain.svg"
      title: "Supply chain safeguards"
      description: "Verify container images against frameworks like SLSA and your own custom organizational policies."
    - icon: "UsersIcon"
      image: "/img/features/open-source.svg"
      title: "Open source, community driven"
      description: "Built in the open with transparent roadmaps, shared governance, and active contributors."

tourTheFactory:
  sectionLabel: "UNDER THE HOOD"
  heading: "Tour The Factory"
  subtitle: "Konflux integrates proven open source projects into a single software factory. Hover to explore each component."
  components:
    - icon: "CogIcon"
      title: "Tekton"
      link:
        href: "https://tekton.dev"
      description: "Kubernetes-native CI/CD pipeline engine that powers all Konflux build and test workflows with composable, reusable task definitions."
    - icon: "LockIcon"
      title: "Sigstore"
      link:
        href: "https://sigstore.dev"
      description: "Keyless signing and transparency log for artifacts. Konflux signs every build output cryptographically — no private key management required."
    - icon: "ClipboardCheckIcon"
      title: "Conforma (EC)"
      link:
        href: "https://github.com/enterprise-contract"
      description: "Enterprise Contract policy engine that validates container images against SLSA, supply chain, and custom organizational policies before release."
    - icon: "SearchIcon"
      title: "Clair"
      link:
        href: "https://github.com/quay/clair"
      description: "Vulnerability scanner that analyzes container images for known CVEs and produces severity reports with remediation guidance."
    - icon: "CubeIcon"
      title: "Buildah"
      link:
        href: "https://buildah.io"
      description: "Daemonless, rootless container image builder. Produces OCI-compliant images from Dockerfiles or scratch — no running daemon needed."
    - icon: "LayerGroupIcon"
      title: "SPDX / CycloneDX"
      link:
        href: "https://cyclonedx.org"
      description: "Konflux generates SBOMs in these industry-standard formats for every build — a complete inventory of all software components in your artifact."
    - icon: "SyncAltIcon"
      title: "Renovate"
      link:
        href: "https://github.com/renovatebot/renovate"
      description: "Automated dependency update bot that keeps your build pipelines and component references current with the latest secure versions."
    - icon: "ShieldAltIcon"
      title: "Hermetic Builds"
      link:
        href: "https://hermetoproject.github.io/hermeto"
      description: "Network-isolated build environments that strengthen reproducibility and prevent undeclared dependencies by blocking external fetches at build time."
    - icon: "CloudUploadAltIcon"
      title: "Release Service"
      description: "Managed release pipelines that orchestrate promotion, gating, and deployment across environments, with a full audit trail for every released artifact."
    - icon: "CertificateIcon"
      title: "In-Toto Attestations"
      link:
        href: "https://in-toto.io"
      description: "SLSA-compliant provenance attestations that cryptographically link every artifact to its source, builder, and build steps."

howItWorks:
  sectionLabel: "HOW IT WORKS"
  heading: "The Konflux code lifecycle"
  subtitle: "Explore the lifecycle of a secure build produced by Konflux"
  steps:
    - icon: "GithubIcon"
      title: "Bring your code"
      subtitle: "Any git source"
      detailTitle: "Bring your code from any git source"
      description: "Connect your git repository to Konflux. Select from tailored trusted build pipelines for your artifact type and customize them to fit your needs — all driven by a simple build configuration."
      badges:
        - "GitHub, GitLab, & Forgejo integration"
        - "Tailored build pipelines per artifact type"
        - "Support for monorepos and multi-component apps"
    - icon: "ShieldAltIcon"
      title: "Hermetic builds"
      subtitle: "Isolated environments"
      detailTitle: "Build in network-isolated environments"
      description: "Konflux supports hermetic builds — network-isolated environments that block all external fetches at build time. Every dependency must be explicitly declared and pre-fetched, so nothing enters the build unrecorded. The result: build-time SBOMs that reflect exactly what went into your artifact."
      badges:
        - "Network-isolated build environments"
        - "All dependencies explicitly declared"
        - "High-confidence build-time SBOMs"
    - icon: "SearchIcon"
      title: "CVE scan & SBOM"
      subtitle: "Analyze artifacts"
      detailTitle: "Know what you built and whether it's vulnerable"
      description: "Clair scans every built artifact for known CVEs, flagging vulnerabilities by severity. Konflux also generates a Software Bill of Materials in CycloneDX or SPDX format — a complete inventory of your artifact's dependencies. Together, they let you identify and address risks before anything reaches production."
      badges:
        - "Automated CVE scanning via Clair"
        - "CycloneDX & SPDX SBOM generation"
        - "Complete dependency inventory"
    - icon: "KeyIcon"
      title: "Signed provenance"
      subtitle: "Tamper-evident record"
      detailTitle: "Cryptographic proof of your build's integrity"
      description: "Konflux uses Sigstore's keyless signing to generate cryptographically verifiable provenance for every build. The provenance records what was built, how it was built, and what the scans found — a tamper-evident audit trail. Consumers can independently verify that the SBOM, the vulnerability scan, and the build itself are genuine."
      badges:
        - "Keyless signing via Sigstore"
        - "Verifiable build metadata"
        - "Tamper-evident audit trail"
    - icon: "ClipboardCheckIcon"
      title: "Verify artifacts"
      subtitle: "Conforma policies"
      detailTitle: "Verify artifacts against enterprise policies"
      description: "Before release, every artifact passes through Conforma's Enterprise Contract policy engine. It validates against SLSA levels, supply chain requirements, and your organization's custom rules — only compliant software reaches release."
      badges:
        - "Enterprise Contract policy engine"
        - "SLSA level verification"
        - "Custom organizational policies"
    - icon: "CloudUploadAltIcon"
      title: "Code released"
      subtitle: "Deployed to prod"
      detailTitle: "Release verified code to production"
      description: "The Release Service orchestrates promotion across environments with full gating and audit trails. Every deployed artifact traces back to its source commit, build, and verification results."
      badges:
        - "Managed release pipelines"
        - "Multi-environment promotion"
        - "Full audit trail from source to prod"

bottomCTA:
  checkIcons: 3
  heading: "Bring your code, we'll secure the rest"
  subtitle: "Connect any git repository, select a build pipeline, and Konflux handles the rest — building, scanning, generating SBOMs, and signing provenance for every artifact."
  primaryCTA:
    label: "Get started"
    href: "/getting-started"
  secondaryCTA:
    label: "Read the docs"
    href: "https://konflux-ci.dev/docs/"

editLink:
